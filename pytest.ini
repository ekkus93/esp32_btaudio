[pytest]
testpaths = esp_bt_audio_source/tools
python_files = test_*.py *_test.py
addopts = -q

; Restrict test collection to the project's tools test folder which contains
; the harness and PTY integration tests we maintain. This avoids importing
; external third-party test trees bundled in subfolders that require extra
; environment/tooling (Python2, hardware daemons, etc.) and produced many
; collection/import errors when running pytest from the repo root.
