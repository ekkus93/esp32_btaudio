[pytest]
# Test discovery paths
testpaths = tests

# Python test file patterns
python_files = test_*.py

# Python test class patterns
python_classes = Test*

# Python test function patterns  
python_functions = test_*

# Default pytest options
addopts = 
    -v
    --tb=short
    --strict-markers

# Custom markers
markers =
    hardware: mark test as requiring physical hardware (Raspberry Pi, ESP32, etc.)
    slow: mark test as slow running (minutes to hours)

# Test filtering
# By default, skip hardware tests unless --run-hardware is specified
# Integration tests will auto-skip on non-Raspberry Pi systems

# Console output
console_output_style = progress

# Warnings
filterwarnings =
    ignore::pytest.PytestExperimentalApiWarning
