; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:denky32]
platform = espressif32@6.10.0  ; Updated to the latest platform version supporting ESP-IDF 5.5.0
board = denky32
framework = espidf  ; Set to the desired ESP-IDF version
monitor_speed = 115200  ; Set initial baud rate to 115200 
build_flags = 
    ; Removed CONFIG_BT_ENABLED and CONFIG_BT_BLUEDROID_ENABLED to avoid redefinition
    ; -DCONFIG_BTDM_CTRL_MODE_BTDM=y
    ; -DCONFIG_BTDM_CTRL_BR_EDR_SCO_DATA_PATH_EFF=0
    ; -DCONFIG_BTDM_CTRL_MODE_BR_EDR_ONLY=n          # Handled in sdkconfig.defaults
    ; -DCONFIG_BTDM_CTRL_HCI_MODE_VHCI=n             # Handled in sdkconfig.defaults
    ; -DCONFIG_BTDM_CTRL_HCI_UART_NO=n               # Handled in sdkconfig.defaults
    -DCONFIG_BTDM_CTRL_HCI_UART_BAUDRATE=921600
    ; -DCONFIG_BTDM_CTRL_PINNED_TO_CORE_0=n          # Handled in sdkconfig.defaults
    ; -DCONFIG_BTDM_CTRL_AUTO_LATENCY_EFF=n          # Handled in sdkconfig.defaults
    ; -DCONFIG_BTDM_CTRL_LEGACY_AUTH_VENDOR_EVT_EFF=n # Handled in sdkconfig.defaults
    -DCONFIG_BTDM_CTRL_PCM_ROLE_EFF=0
    -DCONFIG_BTDM_CTRL_PCM_POLAR_EFF=0
    -DCONFIG_BTDM_CTRL_DUPL_SCAN_CACHE_SIZE=20
    -DCONFIG_BTDM_CTRL_DUPL_SCAN_CACHE_REFRESH_PERIOD=0
    -DCONFIG_BTDM_CTRL_SCAN_DUPL_TYPE=0
    -DCONFIG_BTDM_CTRL_SCAN_DUPL_EN=n               # Handled in sdkconfig.defaults
    -DCONFIG_BTDM_CTRL_BLE_MESH_SCAN_DUPL_EN=n      # Handled in sdkconfig.defaults
    -DCONFIG_BTDM_CTRL_BLE_SLEEP_CLOCK_ACCURACY_INDEX_EFF=0
    -DCONFIG_BTDM_CTRL_ADV_DUPL_SCAN_CACHE_SIZE=20
    -DCONFIG_BTDM_CTRL_ADV_DUPL_SCAN_REFRESH_PERIOD=0
    -DCONFIG_BTDM_CTRL_ADV_DUPL_SCAN_TYPE=0
    -DCONFIG_BTDM_CTRL_ADV_DUPL_SCAN_EN=n           # Handled in sdkconfig.defaults
    -DCONFIG_BTDM_CTRL_ADV_DUPL_SCAN_MESH_EN=n      # Handled in sdkconfig.defaults
    -DCONFIG_BTDM_CTRL_ADV_DUPL_SCAN_MESH_CACHE_SIZE=50
    -DCONFIG_BTDM_CTRL_ADV_DUPL_SCAN_MESH_CACHE_REFRESH_PERIOD=0
    -DCONFIG_BTDM_CTRL_ADV_DUPL_SCAN_MESH_TYPE=0
    
    ; Removed A2DP-related build flags to use sdkconfig.defaults
    ; -DCONFIG_BT_A2D_SINK=y
    ; -DCONFIG_BT_A2D_SINK_NUM_CLIENTS=1
    ; -DCONFIG_BT_A2D_SINK_STACK_SIZE=4096
    ; -DCONFIG_BT_A2D_SINK_AUDIOPATH_BT=y
    ; -DCONFIG_BT_A2D_SINK_CODEC=y
    ; -DCONFIG_BT_A2D_SINK_CODEC_SBC=y
    ; -DCONFIG_BT_A2D_SINK_CODEC_AAC=y
    ; -DCONFIG_BT_A2D_SINK_CODEC_MP3=y
    ; -DCONFIG_BT_A2D_SINK_RECOVERY=y
    ; -DCONFIG_BT_A2D_SINK_RESTRICT_CODEC_USAGE=y

    ; Disable LTO-related build flags
    ; -Os                         ; Enable size optimization
    ; -flto                       ; Disable Link-Time Optimization
    ; -ffunction-sections         ; Place each function in its own section
    ; -fdata-sections             ; Place each data item in its own section
    ; -Wl,--gc-sections           ; Remove unused sections
    ; -g0                         ; Strip debug symbols

build_unflags = 
    ; Remove any previously set incorrect A2DP flags if necessary
    ; Ensure no debug flags are set
    -g
    ; -flto                       ; Remove LTO flags if previously set

; Removed lib_deps as 'esp32-esp-idf' is not a valid library
; lib_deps = esp32-esp-idf

; Set flash size to 4MB
board_build.flash_size = 4MB

; Disable Link-Time Optimization
; link_ldf = yes
; Remove LTO settings

board_build.sdkconfig_path = sdkconfig.denky32
