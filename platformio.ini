; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:denky32]
platform = espressif32@6.10.0  ; Updated to the latest platform version supporting ESP-IDF 5.5.0
board = denky32
framework = espidf  ; Set to the desired ESP-IDF version
monitor_speed = 115200  ; Set initial baud rate to 115200 
build_flags = 
    ; Core Bluetooth configs
    -DCONFIG_BTDM_CTRL_HCI_UART_BAUDRATE=921600
    -DCONFIG_BTDM_CTRL_PCM_ROLE_EFF=0
    -DCONFIG_BTDM_CTRL_PCM_POLAR_EFF=0
    -DCONFIG_BTDM_CTRL_DUPL_SCAN_CACHE_SIZE=20
    -DCONFIG_BTDM_CTRL_BLE_SLEEP_CLOCK_ACCURACY_INDEX_EFF=0
    
    ; Size optimization flags
    -Os
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -DNDEBUG
    ; Change logging level to INFO instead of NONE
    -DLOG_LOCAL_LEVEL=ESP_LOG_INFO

build_unflags = 
    -g
    -Og
    -O0
    -O1
    -O2
    -O3

board_build.flash_size = 4MB
board_build.partitions = partitions.csv
board_build.f_cpu = 240000000L
board_build.sdkconfig_path = sdkconfig.denky32
