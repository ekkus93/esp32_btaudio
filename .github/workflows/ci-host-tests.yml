name: CI — host tests (optimized)

on:
  push:
    paths:
      - 'esp_bt_audio_source/**'
      - '.github/workflows/ci-host-tests.yml'
  pull_request:
    paths:
      - 'esp_bt_audio_source/**'
  workflow_dispatch:

concurrency:
  group: host-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup cache for CMake build dir
        uses: actions/cache@v4
        with:
          path: |
            esp_bt_audio_source/test/host_test/build_host_tests
            ~/.cache
          key: ${{ runner.os }}-cmake-host-tests-${{ hashFiles('**/CMakeLists.txt','esp_bt_audio_source/test/host_test/**') }}
          restore-keys: |
            ${{ runner.os }}-cmake-host-tests-

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential cmake pkg-config git

      - name: Configure and build host tests
        working-directory: esp_bt_audio_source/test/host_test
        run: |
          mkdir -p build_host_tests
          cd build_host_tests
          cmake ..
          cmake --build . -- -j$(nproc)
          # show build dir contents for debugging
          ls -la .. || true

      - name: Install Python test deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest

      - name: Run Python unit tests
        run: |
          echo "Running Python unit tests (symbolizer)..."
          python3 -m pytest -q tools/symbolize_pairing

      - name: Run CTest
        working-directory: esp_bt_audio_source/test/host_test/build_host_tests
        run: |
          # Run tests. Produce JUnit XML when supported. Always capture full CTest output to ctest.log.
          set -e
          # ensure the build directory exists (safety if previous step failed or path changed)
          mkdir -p .
          # Capture output to ctest.log in all cases so the artifact uploader always finds something.
          if ctest --help | grep -q -- --output-junit; then
            # Produce JUnit XML and also tee output to ctest.log
            ctest --output-on-failure -j1 --output-junit test-results.xml 2>&1 | tee ctest.log || true
          else
            ctest --output-on-failure -j1 2>&1 | tee ctest.log || true
          fi

      - name: Prepare artifacts (JUnit or ctest.log)
        working-directory: esp_bt_audio_source/test/host_test/build_host_tests
        run: |
          # Prefer test-results.xml if produced, otherwise ensure ctest.log exists
          if [ -f test-results.xml ]; then
            echo "JUnit XML produced"
          else
            if [ ! -f ctest.log ]; then
              # If ctest didn't write a log, capture the last 200 lines of CTest from the step logs
              echo "No ctest.log found; creating placeholder" > ctest.log
            fi
          fi

      - name: Upload test results (JUnit or ctest.log)
        uses: actions/upload-artifact@v4
        with:
          name: host-test-results
          path: |
            esp_bt_audio_source/test/host_test/build_host_tests/test-results.xml
            esp_bt_audio_source/test/host_test/build_host_tests/ctest.log

      - name: Inspect JUnit artifact (debug)
        if: always()
        working-directory: esp_bt_audio_source/test/host_test/build_host_tests
        run: |
          echo "PWD: $(pwd)"
          if [ -f test-results.xml ]; then
            echo "Found test-results.xml (head):"
            head -n 80 test-results.xml || true
          else
            echo "No test-results.xml found"
          fi

      - name: Annotate JUnit XML as GitHub annotations
        # Parse JUnit XML test results and emit GitHub workflow annotation commands
        # for any <failure> or <error> entries. This avoids external actions and
        # provides inline annotations visible in the run summary.
        if: always()
        working-directory: esp_bt_audio_source/test/host_test/build_host_tests
        run: |
          echo "Searching for JUnit XML files to annotate..."
          shopt -s nullglob || true
          xmls=( *.xml )
          if [ ${#xmls[@]} -eq 0 ]; then
            echo "No JUnit XML files found"
            exit 0
          fi
          python3 - <<'PY'
          import glob, re, xml.etree.ElementTree as ET
          files = glob.glob('*.xml')
          for f in files:
              try:
                  tree = ET.parse(f)
              except Exception as e:
                  print(f"::warning file={f}::Could not parse XML: {e}")
                  continue
              root = tree.getroot()
              for testcase in root.findall('.//testcase'):
                  name = testcase.attrib.get('name','(unnamed)')
                  classname = testcase.attrib.get('classname','')
                  # Look for file/line attributes on testcase or nested elements
                  file_attr = testcase.attrib.get('file') or testcase.attrib.get('classname') or ''
                  line_attr = testcase.attrib.get('line') or ''
                  node = testcase.find('failure') or testcase.find('error')
                  if node is None:
                      continue
                  title = f"{classname}.{name}" if classname else name
                  msg = (node.text or '') + ' ' + (node.attrib.get('message','') or '')
                  msg = msg.strip()
                  # Try to extract file/line from failure text (Python traceback common pattern)
                  if not file_attr:
                      m = re.search(r'File "([^"]+)", line (\d+)', msg)
                      if m:
                          file_attr = m.group(1)
                          line_attr = m.group(2)
                  # Truncate message to reasonable size
                  if len(msg) > 1200:
                      msg = msg[:1200] + '...'
                  # Escape per workflow command requirements
                  esc = lambda s: s.replace('%','%25').replace('\n','%0A').replace('\r','%0D')
                  title_e = esc(title)
                  msg_e = esc(msg)
                  if file_attr and line_attr:
                      file_e = esc(file_attr)
                      print(f"::error file={file_e},line={line_attr},title={title_e}::{msg_e}")
                  elif file_attr:
                      file_e = esc(file_attr)
                      print(f"::error file={file_e},title={title_e}::{msg_e}")
                  else:
                      print(f"::error title={title_e}::{msg_e}")
          PY

      - name: Compress build directory for failure artifacts
        if: failure()
        working-directory: esp_bt_audio_source/test/host_test
        run: |
          tar -czf build_host_tests.tar.gz build_host_tests || true

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build_host_tests
          path: esp_bt_audio_source/test/host_test/build_host_tests.tar.gz || true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: host-test-logs
          path: esp_bt_audio_source/test/host_test/build_host_tests/*.log || true
