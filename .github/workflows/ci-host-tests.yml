name: CI — host tests (optimized)

on:
  push:
    paths:
      - 'esp_bt_audio_source/**'
      - '.github/workflows/ci-host-tests.yml'
  pull_request:
    paths:
      - 'esp_bt_audio_source/**'
  workflow_dispatch:

concurrency:
  group: host-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup cache for CMake build dir
        uses: actions/cache@v4
        with:
          path: |
            esp_bt_audio_source/test/host_test/build_host_tests
            ~/.cache
          key: ${{ runner.os }}-cmake-host-tests-${{ hashFiles('**/CMakeLists.txt','esp_bt_audio_source/test/host_test/**') }}
          restore-keys: |
            ${{ runner.os }}-cmake-host-tests-

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential cmake pkg-config git

      - name: Configure and build host tests
        working-directory: esp_bt_audio_source/test/host_test
        run: |
          mkdir -p build_host_tests
          cd build_host_tests
          cmake ..
          cmake --build . -- -j$(nproc)

      - name: Run CTest
        working-directory: esp_bt_audio_source/test/host_test/build_host_tests
        run: |
          ctest --output-on-failure -j1

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: host-test-logs
          path: esp_bt_audio_source/test/host_test/build_host_tests/*.log || true
