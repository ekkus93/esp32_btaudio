name: Pairing Harness

on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      port:
        description: 'Serial port (e.g. /dev/ttyUSB0)'
        required: true
        default: '/dev/ttyUSB0'
      mac:
        description: 'MAC for mock pairing'
        required: true
        default: 'AA:BB:CC:DD:EE:FF'
      timeout:
        description: 'Timeout seconds'
        required: false
        default: '30'

jobs:
  # The original `run-harness` job required a self-hosted runner with a
  # serial-connected device. It was removed to avoid CI failures when no
  # hardware is available. The mock-based job below remains to exercise the
  # harness logic on `ubuntu-latest`.
  run-harness-mock:
    name: Run pairing harness (software mock)
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyserial

      - name: Run harness with PTY mock
        id: run-mock
        run: |
          set -euo pipefail
          MAC="${{ github.event.inputs.mac || 'AA:BB:CC:DD:EE:FF' }}"
          TIMEOUT="${{ github.event.inputs.timeout || '30' }}"
          python3 esp_bt_audio_source/tools/run_harness_with_mock.py --mac "$MAC" --timeout "$TIMEOUT"

      - name: Upload mock log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pairing-harness-mock-log
          path: build/pairing_e2e_manual_logs/**
