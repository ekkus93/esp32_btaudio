name: Pairing Harness

on:
  workflow_dispatch:
    inputs:
      port:
        description: 'Serial port (e.g. /dev/ttyUSB0)'
        required: true
        default: '/dev/ttyUSB0'
      mac:
        description: 'MAC for mock pairing'
        required: true
        default: 'AA:BB:CC:DD:EE:FF'
      timeout:
        description: 'Timeout seconds'
        required: false
        default: '30'

jobs:
  run-harness:
    name: Run pairing harness (requires serial hardware)
    runs-on: [self-hosted, serial]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyserial jq

      - name: Run harness
        id: run
        run: |
          set -euo pipefail
          LOGDIR=build/pairing_e2e_manual_logs
          mkdir -p "$LOGDIR"
          out=$(python3 esp_bt_audio_source/tools/host_pairing_driver.py --port "${{ github.event.inputs.port }}" --mac "${{ github.event.inputs.mac }}" --timeout "${{ github.event.inputs.timeout }}")
          echo "$out" > "$LOGDIR/harness_json.out"
          echo "HARNES_OUT<<EOF" >> $GITHUB_OUTPUT
          echo "$out" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          status=$(echo "$out" | jq -r .status)
          logfile=$(echo "$out" | jq -r .logfile)
          echo "detected status: $status"
          if [ "$status" != "success" ]; then
            echo "Harness reported failure: $out"
            exit 1
          fi

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pairing-harness-log
          path: build/pairing_e2e_manual_logs/**

  run-harness-mock:
    name: Run pairing harness (software mock)
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyserial

      - name: Run harness with PTY mock
        id: run-mock
        run: |
          set -euo pipefail
          python3 esp_bt_audio_source/tools/run_harness_with_mock.py --mac "${{ github.event.inputs.mac }}" --timeout "${{ github.event.inputs.timeout }}"

      - name: Upload mock log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pairing-harness-mock-log
          path: build/pairing_e2e_manual_logs/**
