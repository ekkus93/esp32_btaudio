name: Pairing Harness

on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      port:
        description: 'Serial port (e.g. /dev/ttyUSB0)'
        required: true
        default: '/dev/ttyUSB0'
      mac:
        description: 'MAC for mock pairing'
        required: true
        default: 'AA:BB:CC:DD:EE:FF'
      timeout:
        description: 'Timeout seconds'
        required: false
        default: '30'

jobs:
  # The original `run-harness` job required a self-hosted runner with a
  # serial-connected device. It was removed to avoid CI failures when no
  # hardware is available. The mock-based job below remains to exercise the
  # harness logic on `ubuntu-latest`.
  run-harness-mock:
    name: Run pairing harness (software mock)
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyserial

      - name: Run harness with PTY mock
        id: run-mock
        run: |
          set -euo pipefail
          MAC="${{ github.event.inputs.mac || 'AA:BB:CC:DD:EE:FF' }}"
          TIMEOUT="${{ github.event.inputs.timeout || '30' }}"
          python3 esp_bt_audio_source/tools/run_harness_with_mock.py --mac "$MAC" --timeout "$TIMEOUT"

      - name: Upload mock log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pairing-harness-mock-log
          path: build/pairing_e2e_manual_logs/**

  test-with-sanitizers:
    name: Run tests with AddressSanitizer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential lcov

      - name: Run tests with AddressSanitizer
        run: |
          cd esp_bt_audio_source
          python3 ../tools/run_all_tests.py --no-device --asan --no-standalone
        timeout-minutes: 10

      - name: Upload ASan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asan-test-results
          path: esp_bt_audio_source/test/host_test/build_host_tests/

  test-with-valgrind:
    name: Run Valgrind memory checks (main branch only)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential valgrind

      - name: Run tests with Valgrind
        run: |
          cd esp_bt_audio_source
          python3 ../tools/run_all_tests.py --no-device --valgrind --no-standalone
        timeout-minutes: 30

      - name: Upload Valgrind results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-test-results
          path: esp_bt_audio_source/test/host_test/build_host_tests/

  test-with-coverage:
    name: Generate code coverage report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential lcov

      - name: Run tests with coverage
        run: |
          cd esp_bt_audio_source
          python3 ../tools/run_all_tests.py --no-device --coverage --no-standalone

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-report
          path: tmp/coverage_html/

      - name: Generate coverage badge
        if: success()
        run: |
          # Extract coverage percentage from lcov summary
          COVERAGE=$(lcov --summary tmp/coverage.info 2>&1 | grep "lines" | sed 's/.*: \([0-9.]*\)%.*/\1/')
          echo "Coverage: ${COVERAGE}%"
          echo "COVERAGE=${COVERAGE}" >> $GITHUB_ENV

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const coverage = process.env.COVERAGE;
            const comment = `### Code Coverage Report\n\n` +
              `- **Line Coverage**: ${coverage}%\n` +
              `- See detailed HTML report in artifacts`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            })
